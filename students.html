{% extends 'base.html' %}

{% block content %}
<section class="container py-5">
    <h2 class="text-center mb-5 animate__animated animate__fadeIn">All Students</h2>

    <div class="table-responsive">
        <table class="table table-hover shadow">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Student Name</th>
                    <th>Email</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for student in students %}
                <tr class="animate__animated animate__fadeInUp">
                    <td>{{ student[0] }}</td>
                    <td>{{ student[1] }}</td>
                    <td>{{ student[2] }}</td>
                    <td>
                        <a href="{{ url_for('my_courses', student_id=student[0]) }}" class="btn btn-sm btn-primary">
                            <i class="fas fa-book-open me-1"></i>Courses
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</section>
{% endblock %}
